# Services use voluptuous schemas in __init__.py; descriptions are translated via strings.json.

set_charger_control:
  name: Set charger control
  description: >-
    Change charger on/off, charging mode, or maximum power. At least one of enabled,
    mode, or max_power should be set.
  fields:
    installation_id:
      name: Installation ID
      description: Jullix installation ID for the site that owns this charger.
      required: true
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      selector:
        text:
    charger_mac:
      name: Charger MAC
      description: Charger identifier (MAC or ID from Jullix).
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    enabled:
      name: Enabled
      description: Turn the charger on (true) or off (false).
      required: false
      example: true
      selector:
        boolean:
    mode:
      name: Mode
      description: Charging mode — eco, turbo, max, or block.
      required: false
      example: "eco"
      selector:
        select:
          options:
            - eco
            - turbo
            - max
            - block
    max_power:
      name: Max power (kW)
      description: Cap charging power between 1.4 and 22 kW.
      required: false
      example: 11.0
      selector:
        number:
          min: 1.4
          max: 22
          step: 0.2
          unit_of_measurement: kW

run_algorithm_hourly:
  name: Run hourly optimization
  description: >-
    Runs Jullix hourly optimization for the given installation (advanced / automation use).
  fields:
    installation_id:
      name: Installation ID
      description: Jullix installation ID.
      required: true
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      selector:
        text:

assign_chargersession:
  name: Assign charge session
  description: Assign a charge session to a charger and/or car.
  fields:
    installation_id:
      name: Installation ID
      description: Jullix installation ID.
      required: true
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      selector:
        text:
    session_id:
      name: Session ID
      description: Session identifier from Jullix.
      required: true
      example: "session-12345"
      selector:
        text:
    charger_mac:
      name: Charger MAC
      description: Optional charger to bind the session to.
      required: false
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    car_id:
      name: Car ID
      description: Optional vehicle ID.
      required: false
      example: "car-789"
      selector:
        text:

update_tariff:
  name: Update tariff
  description: Set the active tariff for an installation (must match values Jullix accepts).
  fields:
    installation_id:
      name: Installation ID
      description: Jullix installation ID.
      required: true
      example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      selector:
        text:
    tariff:
      name: Tariff
      description: Tariff code such as single or dual.
      required: true
      example: "dual"
      selector:
        text:
